layout: default
title: Posts | Ocean of Opportunities

<!-- !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!! -->
<!-- !! Renders the Posts page. Do NOT add posts manually here. Make an entry for them in _posts folder. They will appear automatically. !! -->
<!-- !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!! -->

<style>
  body { display: block; }
</style>

<div style="width: 100%; display: block;">
<h1>Blog Posts</h1>

  <div style="display: inline-flex; white-space: nowrap; width: 100%; margin: 0 auto; justify-content: left; align-items: left">
    <a href="{{ site.baseurl }}/posts" class="glowing-btn-pressed" style="margin-left: 0; font-size: 0.75em; justify-content: center; align-items: center;">
      <span>All</span> 
    </a>
    &nbsp;
    <a href="{{ site.baseurl }}/posts/filter-by-tags" class="glowing-btn" style="font-size: 0.75em; justify-content: center; align-items: center;">
      <span>Tags</span> 
    </a>
    &nbsp;
    <a href="{{ site.baseurl }}/posts/filter-by-categories" class="glowing-btn" style="font-size: 0.75em; justify-content: center; align-items: center;">
      <span>Categories</span> 
    </a>
  </div><br><br>

<ul class="post-list" style="width: 100%; list-style-type: none; padding-left: 0; margin: 0">
  {% for post in site.posts %}
    <li style="padding-left: 0; margin: 0">
      <a href="{{ post.url | relative_url }}" class="glowing-btn" style="display: block; width: 100%; padding: 25px; border-radius: 15px;">
        <h3>{{ post.title }}</h3>
        <p>{{ post.excerpt | strip_html | truncatewords: 10 }}</p>
        <span class="post-date">{{ post.date | date: "%b %d, %Y" }}</span>
      </a>
    </li><br>
  {% endfor %}
</ul></div>
